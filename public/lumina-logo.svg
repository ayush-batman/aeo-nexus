<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- A glowing minimalist prism/eclipse representing 'Lumina' shedding light on the black box -->
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="white" stop-opacity="1" />
      <stop offset="40%" stop-color="white" stop-opacity="0.8" />
      <stop offset="100%" stop-color="white" stop-opacity="0" />
    </radialGradient>
    <filter id="blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" />
    </filter>
  </defs>

  <!-- Atmospheric Glow -->
  <circle cx="50" cy="50" r="30" fill="url(#glow)" filter="url(#blur)" opacity="0.4" />
  
  <!-- The Crisp Prism/Sun -->
  <circle cx="50" cy="50" r="20" fill="white" />
  
  <!-- The 'Black Box' Cutout -->
  <path d="M50 25 L75 50 L50 75 L25 50 Z" fill="black" />
  
  <!-- The inner light escaping -->
  <circle cx="50" cy="50" r="8" fill="white" />
</svg>
